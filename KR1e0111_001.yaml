body:
  text: 春秋世族譜卷上右諭徳陳厚耀撰王子系未詳者王子黨僖十見王子瑕襄三十見奔於王子廖襄三十見奔於王孫沒昭十二殺王子還子朝之黨殺昭二十二王子處昭二十二見王子姑發弱鬷延定稠以上俱靈景之族昭二十二殺王子趙車昭二十九見王孫牟周雜姓氏名號字位過密無法显示宰咺隠元見宰官咺名也未書氏武氏子隐二見周大夫之嗣未書名武氏隐五見未書名凡伯周任隐七見南季隱九見注南氏季字渠伯紏極四見注渠氏伯紏名或曰渠國也仍叔之子弱之辭或田仍地名辛伯極十八見家父桓八見桓十五又見注家氏父字武亡家地名榮叔字位過密王人子突荘六見夷詭諸荘十六枝夷來地蒍國荘十六見子國仝上邊伯子禽荘十九見未氏祝跪詹父俱荘十九見石速荘十九見周謄夫辛有冨辰仝上伯服僖二十四見游孫伯仝上頽叔桃子字位過密簡師父左鄢父俱僖二十四見倉葛僖二十五見注陽樊人芮良夫丈元見引詩聃啓文十四見子服宣六見未氏檀伯達成十一見武王時人辛甲襄王見武王時太史史狡襄十見殺伯輿瑕禽俱襄十見隂里襄十二見鞏成襄三十見詹桓公昭九見詹亦地名賔滑萇𢎞昭十一見哀三殺萇叔仝上庾皮昭十二見庾過昭十二見殺皮之子也瑕辛宫嬖綽隂忌老陽子俱昭十二殺州鳩昭二十二見伶官賔起昭二十二見子朝之黨賓孟仝上榮錡氏昭二十二見摰荒昭二十二殺鞏簡公昭二十二見定二殺鄩肹司徒醜子旅氏俱昭二十二見鄩羅昭二十三見鄩肹之子南宫極昭二十三見震死于朝之黨南宫嚚昭二十四見南宫祕之子隂不佞昭二十四見隂忌昭二十六見與昭十二見者别褚氏昭二十六見冨辛昭三十二見或云富辰子石張昭三十二見慶氏定七見注守姑蘇大夫黨氏定七見石尚定十四見注天子之士魯公子系未詳者公子豫隠无見公子翬隐四見羽父仝上柔桓十一見注未族公子達桓十七見溺書氏公子偃荘十見公子魚閔二見奚斯仝上公子買僖二十八見殺子業公子慗昭十二見子仲仝上公孫朝昭二十六見成邑大夫公孫宿哀十四見為成宰公孫成哀十五見字位過密無法显示魯雜姓氏名號字位過密無法显示費伯隐元見費庈父隐二見衆仲隱四見寪氏隠十一見注大夫申繻秦子梁子荘九見注二子公御及戎石曹劌荘十見歂孫荘十一見公右也顓孫黨氏荘三十二見注大夫也襄十一黨氏之溝是梁氏荘三十二見注大夫圉人犖鍼巫氏鍼季荘三十二見注大夫卜齮閔二見弑閔公者卜楚丘夏父弗忌文二見魯宋伯國語注云展氏之族侯叔夏緜房冨父終甥以上三人見俱文十一公冉務人叔仲忠伯之牢太史克文十八見禽鄭成二見匡句須成十七見匠慶南遺宰昭四又見秦堇父襄十見秦丕茲襄十見子厪父之狄虒彌郰人紇郰叔紇襄十七見秦周襄十八見御叔襄二十一見申豐字位過密無法显示閔子馬襄二十三見閔馬父昭二十六見豐㸃襄二十三見孟氏之御榮成伯襄二十八見榮駕鵞定元見公冶襄二十九見季氏属大夫公巫召伯顔荘叔鄫鼓父黨叔以上四人俱襄二十九見梁其踁昭元見臣叔孫家曾夭昭元見曾阜昭元見注叔孫家臣豎牛昭四見叔孫穆子之孽子萊書昭四見杜洩昭四見叔孫氏之宰梓慎昭七見謝息昭七見孟僖子家臣薳氏南蒯昭十二見南遺之子冶區夫昭十三見注大夫司鐸射昭十三見司徒老祁慮癸俱昭十四見南蒯家臣申須昭十七見仲尼昭二十見孔丘定十見琴張昭二十見申夜姑師巳饔人檀秦遄左師展俱昭二十五見􅒼柤昭二十五見昭公恃人鬷戾昭二十五見叔孫之司馬魴假昭二十五見郈邑大夫女賈昭二十五見季氏家臣冉豎洩聲子野洩俱昭二十六見林雍顔鳴俱昭二十六見陽虎昭二十七見季氏家臣仲梁懐公山不狃定五見費宰子洩即不狃公歛處父定七見公歛陽苫夷定七見臣季氏家苫越定八見顔高定八見勇士顔息冉猛俱定八見冉㑹林楚定八見季氏臣陽越定八見陽虎從弟兹無還定十見公南定十見叔孫家臣武叔黨侯犯定十見叔孫氏臣郈馬正駟赤定十見叔孫氏臣郈工師仲由定十二見季路子路並哀十二季子申句須樂頎俱定見十二子貢定十五見衛賜哀十一見冨父槐哀三見富後父終甥之正常哀三見注季桓子之臣共劉哀三見王犯哀八見吳大夫奔魯為武宰澹䑓子羽哀八見公甲叔子公賓庚析朱鉏㣲虎俱哀八見有若哀八見有子冉求冉子冉有俱哀見十一顔羽哀十一見孟氏臣子羽仝上邴洩哀十一見孟氏臣管周父汪錡林不狃太史固樊遲須俱哀見十一公孫有山氏鉏商哀十四見叔孫氏之車子阬氏哀十四見子羔柴俱哀見十五髙柴季羔釁夏哀二十四見宗人郭重哀二十五見公孫有陘氏哀二十七見注即有山氏字位過密無法显示晉之公族皆出自獻公以上公族狐氏唐叔之子孫别在戎狄者也欒氏出自靖侯祁氏出自獻侯羊舌氏出自武公見路史韓氏亦公族也自獻公以下詛無畜羣公子由是晉之公族鮮矣晉雜姓氏名號頃父嘉父俱隐六見注大夫師服桓二見潘父桓二見梁𢎞桓三見僖三十三又見疑两人游氏莊二十四見梁五東闗嬖五俱莊二十八見皆嬖臣卜偃閔元見掌卜辛廖閔元見里克舟之僑閔二見虢臣奔晉僖二十八誅梁餘子飬閔元見罕夷閔二見杜原欵寺人披僖五見井伯僖五見虞臣奔晉或云即百里奚賈華僖六見僖十殺梁由靡虢射俱僖八見吕甥僖十見瑕吕飴甥僖十五子金僖十五隂飴甥僖十五注吕甥食采於隂瑕甥共華叔堅騅歂纍虎特宫山祁以上六人皆里克之黨僖十殺慶鄭僖十四見家僕徒僖十五見史蘇僖十五見卜史蛾析僖十五見注大夫顛頡字位過密介之推僖二十四見寺人勃鞮僖二十五見注即寺人披茅伐僖二十八見屠擊頭須僖二十四見注一曰里鳬須晋侯之竪醫衍僖三十見莱駒僖三見十三陽虎父僖三十三見狼瞫王官無地俱文二見寗嬴文五注寗晉邑羸逆旅大夫賈佗文六見晋太師或云即賈季狐射姑臾駢箕鄭文七見萁鄭父仝上步昭戎津俱文七見解陽文八見公壻池晋君之壻梁益耳蒯得俱文八見詹嘉文十三見瑕嘉成元見鞏朔文十七見士荘伯鞏伯並成二見鉏麑宣二見力士提彌明靈輙俱宣二見董狐字位過密鮑癸逄大夫俱宣見十二鄭丘緩綦母張俱成二見夏陽說糴茷成十見杜溷羅茀翰胡俱成十六見孟張成十七見寺人清沸魋匠麗氏成十七見注嬖大夫程滑成十七見弑厲公夷陽五長魚矯伯子同氏俱成十七見右行辛成十八見賈辛昭二十二鐸遏冦成十八解狐㐮三見和組父田蘇㐮七見注晋賢人子員襄四見行人左史襄十四見注大夫師曠㐮十四見晋樂師子野虞丘書襄十六邢伯襄十八見中公巫臣之子邢侯昭十四具丙襄十八追喜劉難州綽俱襄十八州賔襄二十一見欒氏之老箕遺黄淵嘉父邴豫邴師司空靖董叔俱見八㐮十申書以上八人俱㐮二十一殺樂盈之黨也樂王鮒㐮二見十一樂桓子邢蒯㐮二十一見斐豹㐮二十三見督戎㐮二十三臣見欒氏之輔躒襄二十四見又見昭五宛沒子朱㐮二十六見行人史趙㐮三十見注大史又見昭八梁丙昭三見原續慶字位過密箕襄昭五見注韓氏族邢𢃄昭五見注韓氏族閻嘉昭九見屠蒯昭九見膳宰嬖叔雍子昭十四見誅渉佗司馬督俱昭二十二見司馬烏昭二十八箕遺樂徴右行詭俱昭二十二見成公般昭二見十六鄔藏昭二十八見注祁盈家臣孟丙樂霄􅒼安成鱄閻没俱昭二十八見蔡墨昭二十九見注太史蔡史墨仝上史墨昭三十二史黯哀二十觀虎定三見成何定八見渉賔定十三見邯郸午之臣董安于梁嬰父定十三見苟躒之嬖臣士鮒析成鮒小王桃甲字位過密樂丁繁羽宋勇郵無恤子良郵良王良傅傁哀二見注趙簡子臣公孫尨哀二見注范氏臣王生哀五見范氏臣張栁朔史龜哀九見司馬寅哀十三見楚隆哀二十見注趙簡子臣長武子哀二十三見酅魁壘哀二十七見注晉士衛公子系未詳者公子歂犬僖二十八殺子蟜子伯子皮子行公孫丁襄十四見公孫敢襄十五見公孫免餘公孫無地公孫臣公子荆襄二十九見公南楚昭二十見公子朝襄二十九見李札所稱為君子者公子朝四書人物考以為即宋朝然考之傳注並無明文子玉霄子高魴俱昭二十奔晋字位過密無法显示衛雜姓氏名號字位過密無法显示右宰醜隠四見注右宰官名醜衛臣獳羊肩隠四見石碏之家宰渠孔子伯黄夷華龍滑禮孔俱閔二見衛太史也禮至僖二十四見元咺僖二十八見角長牂華仲鍼荘子周歂冶厪俱僖二十八見士榮向禽仲叔于奚成二見新蔡人師曺右宰穀尹公佗俱㐮十四見庾公差襄十四見子魚仝上蘧伯玉襄十四見蘧瑗㐮二十六見殖綽茅氏雍鉏襄二十六見孫氏臣齊惡昭元見齊子仝上趙黶昭九見屠伯齊豹注齊忠之子齊子氏仝上宗魯祝鼃華齊慶比鴻駵魋華寅昭二十見析朱鉏成子昭二十見注公子黑背之孫渠子昭二十見齊氏之宰彪徯子行敬子定四見祝佗定四見太祝子魚仝上彌子瑕注彭封彌子襄二十五滑羅定十二見趙陽定十四奔宋注趙黶孫戯陽速定十四見注蒯瞶家臣宋朝宋子朝哀十一見行人子羽哀十二見注與鄭國官周名子木哀十二見公文氏欒寕哀十五見孔氏之老渾良夫哀十五見孔氏之竪季子哀十五見即子路為孔氏也宰召獲哀十五見髙柴子羔仝上盂黶哀十五見注蒯瞶黨瞞成哀十五見衛司徒子還成哀十六寺人羅子伯季子俱哀十六見鄢武子哀十六見肸仝上許公為哀十六見許為仝上胥彌赦公文懿子哀二十五見公文要仝上司冦亥拳彌鄄子士字位過密祝史揮哀二十五見鄭公子系未詳者字位過密無法显示公子吕隠元見子封仝上公子曼伯隠五見檀伯桓十五子元隠五見亦公子也宛未賜族不書氏公孫閼𨼆十一見子都仝上公孫獲𨼆十一見公子閼荘十六見殺或云即公孫閼公子士洩僖二十四見或作公子士以洩是字属下文堵俞彌作一人者近公子歸生文二見宣十卒子家公子堅公子尨俱文九見公子宋宣四見子公仝上公子曼滿宣六見公子魚臣宣十二見僕叔仝上公孫申成四見叔申成十見叔禽成十殺叔中弟公子鰌子狐子熈子侯子丁俱襄八殺孫擊孫惡俱子狐子襄八奔衛子侯襄二見十一公孫揮㐮二見十四子羽仝上行人子羽㐮二十九行人揮昭元公孫肸子上公孫登俱昭十八見公孫林哀二見洩氏無系可考下同洩駕隐五見洩伯隐七洩堵冦僖二十見洩駕堵氏堵叔僖七見堵俞彌僖二十四見堵女父襄十見奔宋堵狗字位過密石氏石申父僖二十四見石癸宣三石楚文十七見石制子服石首石㚟㐮十一見石孟襄二十二見字位過密無法显示侯氏侯宣多僖二十四見侯羽成七見侯獳成十七見侯晉襄十見奔晉皇氏皇武子僖三十三見皇戌宣十二見皇辰成十八見皇耳㐮十見注皇戌子皇頡尉氏尉止襄十見殺尉翩㐮十見奔宋止之子司氏㐮十年傳司氏侯氏堵氏子師氏皆字位過密司臣襄十見奔宋司齊襄十見臣之子鄭雜姓氏名號字位過密無法显示祭仲隐元見桓十一注祭氏仲名祭足隐三祭仲足桓五祭封人仲足桓十一潁考叔原繁隐五見荘十四殺良佐隐七見瑕叔盈尹氏俱隐十一見祝聃髙渠彌桓五見桓十八為齊所殺雍糾桓十五見周氏桓十五見又見昭三傅瑕荘十四見强鉏荘十六見鄭詹荘十七見髙克閔二見聃伯僖二見孔叔僖三見申侯僖四見叔詹僖七見又見僖二十二史記云文公弟師叔僖七見孔將鉏僖二十四見佚之武燭之武弦髙僖三十三見鄭商人髠屯僖三十三見鄭之外僕髠髪而名屯者樂耳文九見王子伯廖鄭賈人成三見共仲成七見姚句耳唐茍俱成十兗王子伯駢字位過密見㐮十一子師氏㐮見十子師僕襄十見殺師悝師觸師蠲俱襄見十一師筏師慧俱㐮十五見宛射犬㐮二十四見注鄭公孫禆竈禆諶樂成㐮三十見僕展㐮三十見伯有黨馮簡子尹何俱㐮三十一見徐吾犯渾罕子寛仝上曼伯見昭十一注即桓伯又隱五鄭公子冨子屠擊祝欵䜿柎字位過密里析昭十八見商成公昭十八見鄧祈定九見殺許瑕㐮九見罕達之嬖郲張鄭羅俱哀九見字位過密無法显示春秋世族譜巻上
