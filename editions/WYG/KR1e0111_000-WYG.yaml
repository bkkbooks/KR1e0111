body:
  text: 春秋世族譜春秋類提要臣等謹案春秋世族譜二卷國朝陳厚耀撰春秋之世自王朝以迄諸侯大夫得姓受氏各有源流其人之見於經𫝊者不可殫數漢宋𠂻有世本四卷唐代尚𫝊今惟孔氏正義中偶載其文而書則久佚隋書經籍志有春秋左氏諸大夫世譜十三卷不知何人所撰今亦無存杜預作春秋釋例中有世族譜一書具載其世系昭穆之詳而自宋以來湮没不見今恭遇聖代表章遺籍釋例一書得於永樂大典中裒輯叢殘復為完帙獨世族譜僅存數條仍不免於闕畧厚耀當時既未覩釋例原本因据孔氏正義旁叅他書作此以補之其體皆仿旁行斜上之例首周世次圖而以周之卿大夫附後次魯次晉次衞次鄭次齊次宋次楚次秦次陳次蔡次曹次莒次杞次滕次許次邾次吳次越次小國諸侯皆先敘其君王世系而附以卿大夫其偶見經𫝊而無世次可稽如周之凡伯南季魯之衆仲秦子之類則别曰雜姓氏名號另為一篇附卿大夫世系之後搜採頗為該洽近時顧棟髙作春秋大事表有世系表二卷其義例與此相近而考証互有異同如周卿大夫之周公忌父臺莊公諸人此書徵引不及顧本之備又脱漏王叔氏世系不載亦為遜於顧本然顧氏於有世系者叙此較詳其無可考者槩闕而不録此書則於經𫝊所載之人祗稱官爵及字者悉臚採無遺實為顧本所未及讀春秋者以此二書互相考証則春秋氏族之學幾乎備矣乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋世族譜原序往余比次左氏春秋欲求釋例十五卷備杜氏一家之學訪諸南中藏書家訖無傳本迺私擬采摭羣書用補先儒墜緒㑹蒙特恩入史館領書局直廬餘暇稍得縱覽於一行姜郭之書先成長厯六卷質諸善算家或蒙見許其元凱釋地雖雜見史𫝊注家中猝不可收拾同館髙編修巽亭出其先宗伯澹人左傳地名四冊薈萃沿革以續杜京之所未備竊意略加増損可用鈔傳獨世族譜中外所行皆坊間陋刻學舍承習譌舛寔多遂本孔氏正義傍及他書勾填塗乙凡七易藳而後定丁酉臘月下直迺得寫成正本其經𫝊中名氏略具而世系無攷者依杜例别出雜人一類其杜説不詳而傍取證佐或彼此小有異同者寧曲從杜氏以存古人謹守師傳之意他日鉤援參互滙成全書以扶缺學祛疑義匪敢同之作者庶幾存詒家塾聊資辯覽云爾曙峰陳厚耀自記
