body:
  text: 春秋世族譜巻下右諭徳陳厚耀撰齊公子系未詳者公子彭生桓十八見公子疆宣十八見公子鉏公子買字位過密無法显示叔孫還襄二十一見二十八又見注羣公子公孫敖襄二見十五公子賈公孫明子山子商子周俱昭十見公孫傁昭十二見公孫夏公孫揮紀事年表云齊公族崔氏出自丁公東郭氏出自桓公見左傳命卿髙氏出自文公見唐宰相表國氏亦姜姓不知所出也隰氏出自荘公見國語注慶氏出自桓公或云無虧之後欒氏高氏出自惠公是為二惠其異姓則有管氏姬姓鮑氏姒姓俱見國語注晏氏不知所出陳氏出自陳公子完一曰田氏其後代有齊國齊雜姓氏名號字位過密無法显示連稱徒人費召忽雍廩俱荘八見石之紛如荘八見小臣孟陽仲孫湫仲孫閔元見無知之後寺人貂僖二見雍巫僖十七見注即易牙易牙王子成父見文十一邴歜閻職俱文十八見蔡朝南郭偃邴夏逄丑父鄭周父宛茷鋭司徒辟司徒俱成二見華免成十八見夙沙衛㐮二見㐮十九殺寺人也殖綽郭冣俱襄十八見勇士也析文子子家析歸父㐮二十三郭榮㐮十八見工僂㑹㐮十九見榖榮王孫揮召楊申鮮虞之成秩莒恒傅摯曹開晏父戎上之登襄罷師邢公牢成狼蘧疏商子車侯朝桓跳商子游夏之御㓂燭庸之越以上二十人皆勇士俱襄二十三見杞殖把梁華還華周俱㐮二十三見棠公襄二十五殺見二十七賈舉封具鐸父襄伊僂堙以上四人俱襄二十五見死於荘公之難者祝佗父㐮二十五見申蒯字位過密鬷蔑㐮二十五見注隂大夫公外嬖為雀杼所殺非鄭之鬷蔑也士孫襄二見十五申鮮虞烏餘㐮二十六見注大夫棠無咎槖公之子襄二十七殺麻嬰㐮二殺十八北郭子車北郭佐工僂灑渻竈孔虺賈寅俱㐮三十一見司馬竈昭三見二十二又見梁嬰昭八見注子尾家宰子韓晳昭十四見苑何忌祝固史嚚裔欵字位過密梁丘據昭二十見子猶昭二十六烏枝鳴昭二十一見北郭啟昭二十二見子囊𢃄昭二十六見籍丘子鉏定八見敝無存犁彌俱㝎九見邴意兹弦施哀四見闞止哀六見公子陽生家臣也子我仝上江説朱毛俱襄六見公孟綽哀九見宗樓哀十一見宗子陽仝上桑掩胥哀十一見弦多王孫氏哀十一見伍子胥属其子于鮑氏為王孫氏諸御鞅太史子餘俱哀見十四萊章字位過密無法显示宋公子系未詳者公子糓甥文十一見注云皇父充石之子誤公子寅公子御戎公子朱俱昭二十殺公子固公孫援公孫丁俱昭殺二十公孫忌昭二十二見宋六族戴公之後為華氏樂氏老氏皇氏荘公之後為仲氏桓公之後為魚氏蕩氏鱗氏向氏文公之後為靈氏皆公族也其武公之後曰武族穆公之後曰穆族以司城須之難宋文公盡攻而出之見文十八年其名未見經傳樂嬰齊宣十五見樂舉成二見将鉏成十六見亦樂氏族樂裔成十五見為司冦樂轡子蕩仝上樂遄㐮九見樂髠㐮三見樂得襄二十六見門尹得仝上老氏見於春秋者僅一人字位過密無法显示成十五見十八卒公五世孫宋萬荘十二仇牧荘十二見南宫牛荘十二見長萬之子猛獲荘十二見門尹般字位過密耏班文十一見司冦牛父文十一見注云皇父充石之子似未可據髙哀文十四見子哀仝上狂狡羊斟宣二見華元之御叔牂仝上西鉏吾成十八見人見㐮八注云太宰也伯氏襄九見荘朝芮司徒㐮二見十六惠牆伊戾㐮二十六見寺人寺人栁昭六見戴惡昭八見司馬彊昭二十見冝僚昭二十一見司馬侍人臼任鄭翩俱昭二十一見華氏之黨厨人濮張匄豐愆翟僂新荘堇于犨俱昭二十一見省臧士平俱昭二十二見出奔楚陳寅定六見樂祁之宰蘧冨獵定十見公子地之嬖人褚師子肥㐮八見或云平公子非成讙郜延俱襄十三見為鄭所獲田丙哀十七見皇瑗之友子儀克哀十七見桓司馬之臣祝襄楚公子系未詳者字位過密無法显示王孫喜王孫游俱莊二十八見公子朱文九見息公子朱文三子朱文十公子燮文五見文十四殺子燮仝上公子茷文九為陳所獲囚文十三為所公子側子反穆王子司馬仝上公子丙宣十二見公子馮宣十四見公子成成六見成九又見襄十四為右司馬公子申成六見襄二為右司馬殺子西與令尹子西别王子罷成七見公子罷成十二公子平莒所殺公子辰成九見太宰子商成十公子寅成十七見公子槖師成十七見襄十五為右司馬公子何忌襄三見司馬公子罷戎襄九見襄尹十五為古公子宜穀襄十四見為呉所獲公子格襄十六見公子齮襄二十二為司馬王子牟襄二十六見申公子牟仝上公子魴昭十七死于戰司馬子魚仝上王子勝昭十八見楚左尹公子繁定二見注守巢大夫王孫由于定四見寢尹呉由于俱哀十八王孫圉王孫賈俱定五見公子慶哀十九見楚雜姓氏名號字位過密無法显示道朔桓九見閻敖荘十八見鬻拳荘十九見大伯仝上耿之不比荘二十八見逢伯師縉僖二十二見注樂師宛春僖二十八見榮黄僖二十八見榮季仝上仲歸子家文十矞似文十見范邑之巫期思公復遂文十見廬戢黎叔麋俱文十四見子掦窻子貝俱文十六見許伯樂伯攝叔連尹襄老工尹齊唐狡蔡鳩居司馬卯俱宣十二見許偃宣十二見又見成十二飬由基宣十二見飬叔㐮十三黒要成二見連尹襄老之子也鍾儀成七見子閻子蕩清尹弗忌俱成七見巫臣之族工尹襄叔山冉穀陽豎俱成十六見鄧廖揚豚尹宜襄十八見祁犂㐮二十四見子疆息桓子㨗子駢子盂巢牛臣俱㐮二十五見穿封戍㐮二十六見析公雍子示箴尹冝咎昭四見子革襄十九見即鄭公孫然丹昭四鄭丹昭十一右尹子革芋尹無宇昭七見司馬督囂尹午陵尹喜工尹路析父俱昭十二見左史倚相昭十二見楚良蔡洧須務牟史猈枝如子躬俱昭十三見養氏昭十四見㓕其族費無極昭十五見昭二十七誅費氏仝上工尹赤司馬奮揚昭二十見城父司馬太宰犯昭二十一季然昭二十五見郤氏字位過密过密莠尹然工尹糜工尹夀俱昭二十七見晉陳昭二十七见殺鄢將師鄢氏仝上監馬尹大心昭三十見右司馬稽昭三十一見武城黒史皇定四見死于戰吳句卑定四見司馬戌之臣鍾建鑪金俱定四見堂谿氏楚為臺谿氏闉輿罷藍尹亹宋木俱定五見小惟子定六見左司馬眅申公夀餘單餘俱襄四見石乞哀十六見白公勝之徒箴尹固大師子穀哀十七見右領差車哀十七見左史老哀十七見吳由于然稱吳未詳字位過密無法显示秦雜姓氏名號公孫枝僖九見子桑僖十三晉公孫也仕於秦泠至僖十見百里僖十三見即百里奚卜徒父僖十五見堂卜祀子逢孫揚孫俱僖三十見蹇叔僖三十二見孟明僖三十二見百里奚之子孟子仝上百里孟明視僖三十三孟明視文二西乞僖三十二見西乞術僖三十三白乙僖三十三見白乙丙僖三十三子車奄息子車仲行子車鍼虎俱文六見穆公以子車氏三子為殉繞朝文十三見杜回宣十五見力士右大夫説成二見醫緩成十見史顆成十一見成差成十三見女父成十三見士雃襄九見右大夫詹庻長鮑庶長武俱襄見十一庶長無地襄十二見醫和昭元見子蒲子虎俱定五見陳公子系未詳者公孫寧文十七見孔寜宣九公孫佗人定十四見公孫貞子哀十五見蔡公子系未詳者公子駟哀二殺公孫獵哀三見公孫翩哀四殺公孫辰哀四見奔吳公孫姓哀四殺公孫霍哀四見殺公孫盱仝上蔡雜姓氏文之鍇哀四見注大夫曹雜姓氏名號僖負羈僖二十三見侯獳僖二十八見曹伯之豎翰胡昭二十一見公孫􅆠哀七見曹鄙人司城疆字位過密無法显示莒公子及雜氏字位過密無法显示莒慶荘二十七見莒挐僖元見注莒子之弟莒公子務婁襄十四見莒務婁昭元瞀胡公子㓕明昭元見莒牟夷昭五見公子意恢公子鐸蒲餘侯昭十四見注大夫蒲餘侯兹父昭十五苑羊牧之昭二十二見烏存邾公子及雜氏邾庶其襄二十一見奔魯邾畀我㐮二十三見奔魯注庶其之黨羊羅昭十八見公孫鉏昭二十三見徐鉏丘弱茅地俱昭二十三見邾快昭二見十七黑肱邾同族昭三十一見魯夷射姑茅成子哀七見茅夷鴻仝上字位過密無法显示吳公子系未詳者字位過密無法显示公子黨襄十四見為楚所獲公子苦雂昭二十一見王孫彌庸哀十三見為越所執吳雜姓氏名號夀越㐮五見鱄設諸昭二十見刺俠伍員昭二十見子胥昭三十一偃州員太宰嚭哀元年子餘哀二十􅂥庸哀二見徐承哀十見胥門巢展如且姚㐮十二見行人夀於姚哀十三見申叔儀哀十三見越大夫字位過密無法显示常夀過昭五見胥犴夀夢靈姑浮大夫種疇無餘謳陽俱襄十三見諸鞅臯如后庸小國諸侯名號字位過密無法显示虢叔𨼆元見注東虢君虢公忌父𨼆八見西虢君作卿士于周芮伯萬桓三見虢公林父虢仲桓八見注即林父淳于公桓五見即州公榖伯綏桓七見鄧侯吾離桓七見紀季荘四見紀侯失國其弟紀季有之郳犂来荘五見郳即小邾鄧祁侯荘六見注即吾離或云吾離之子燕仲父南燕伯仝上虢叔荘二十見注子虢公林父之虢公醜僖五廧咎如僖二十三見赤狄别種介葛盧長狄僑如見文十一鄋瞞君郕太子朱儒文十一見郕伯文十二舒子平唐惠侯宣十二見潞子嬰兒宣十五見㓕沈子揖成人見無終子嘉父襄三見萊共公浮柔襄六見戎子駒支僖十四見姜戎氏仝上吾離見僖十四北燕伯欵昭三見燕簡公仝上小邾穆公昭三見肥子緜臯昭十二見㓕鼓子䳒鞮戎蠻子嘉昭十六年殺立其子子赤哀四胡子髠昭二十三見沈子逞昭二十三見沈子揖子徐子章禹唐成公定三見唐侯仝上沈子嘉定四見沈子逞之子頓子牂定十四見胡子豹小國諸臣名氏字位過密無法显示紀子帛隐二見注紀大夫或云即紀侯紀裂繻仝上季梁桓六見隨賢臣大良少良鄭所𫉬者韓服桓九見巴行人巴客仝上虞叔桓十見虞公之弟詹父伯嘉騅甥聃甥養甥荘六見注皆鄧甥之仕于舅氏者蕭叔大心因氏工婁氏須遂氏頷氏荘十七見四族皆遂之强宗祝應宗區史嚚荘三見十二三人皆虢臣宮之竒僖二見虞賢臣卜招父僖十七見梁太卜酆舒文七見宣十五又狄臣即潞子之禮焚如榮如簡如見文十一俱長狄僑如之弟還無社宣十二見注蕭大夫仲章宣十五見潞賢臣正輿子萊大夫孟樂襄三見無終子之臣儀楚昭六見徐大夫郳申昭二十見小邾穆公子小邾射字位過密無法显示春秋世族譜巻下
